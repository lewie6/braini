<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control</title>
<style>
:root{--bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--border:#2a2a2a;--text:#e5e5e5;--text2:#888;--accent:#5e6ad2;--success:#2ea043;--warning:#d29922;--danger:#f85149;--purple:#a371f7}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.logo{padding:20px;font-size:18px;font-weight:600;color:var(--accent);border-bottom:1px solid(var(--border);display:flex;align-items:center;gap:8px}
.logo-icon{width:24px;height:24px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:6px;display:flex;align-items:center;justify-content:center}
.nav{flex:1;padding:12px 0}
.nav-item{padding:10px 20px;cursor:pointer;color:var(--text2);transition:.15s;font-size:14px;border-left:2px solid transparent}
.nav-item:hover,.nav-item.active{background:var(--bg3);color:var(--text)}
.nav-item.active{border-left-color:var(--accent)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{padding:20px 30px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;font-weight:600}
.btn{background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}
.btn:hover{background:#6f7cf2}
.content{flex:1;padding:30px;overflow-y:auto}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:30px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px}
.stat-value{font-size:28px;font-weight:600}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}
.stat.accent .stat-value{color:var(--accent)}
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kanban-col{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;min-height:350px}
.kanban-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.kanban-header h4{font-size:12px;font-weight:600;text-transform:uppercase;color:var(--text2)}
.kanban-count{background:var(--bg3);padding:2px 8px;border-radius:10px;font-size:11px;color:var(--text2)}
.task{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:8px;cursor:pointer;transition:.15s}
.task:hover{border-color:var(--accent);transform:translateY(-1px)}
.task-priority{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px}
.task-priority.high{background:var(--danger)}.task-priority.medium{background:var(--warning)}.task-priority.low{background:var(--success)}
.task-title{font-size:13px;font-weight:500;margin-bottom:8px}
.task-meta{font-size:11px;color:var(--text2)}
.section{display:none}
.section.active{display:block}
.projects-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.project{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:20px}
.project h4{font-size:15px;font-weight:600;margin-bottom:8px}
.project p{font-size:13px;color:var(--text2);margin-bottom:16px}
.progress-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--success);transition:width .3s}
.progress-fill.medium{background:var(--warning)}
.project-stats{font-size:12px;color:var(--text2);margin-top:12px}
.mission-box{background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:12px;padding:30px;margin-bottom:30px}
.mission-box h3{color:rgba(255,255,255,.7);font-size:12px;text-transform:uppercase;margin-bottom:10px}
.mission-box p{font-size:20px;font-weight:500}
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.agent{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:20px;text-align:center}
.agent-avatar{width:56px;height:56px;border-radius:50%;background:var(--accent);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:600}
.agent-avatar.henry{background:var(--purple)}
.agent-avatar.idle{background:var(--bg)}
.agent h4{font-size:15px;margin-bottom:4px}
.agent p{font-size:12px;color:var(--text2);margin-bottom:8px}
.agent-status{display:inline-flex;align-items:center;gap:6px;font-size:11px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--success)}
.status-dot.idle{background:var(--text2)}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.calendar-day{background:var(--bg2);padding:12px;min-height:80px}
.calendar-day .date{font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text2)}
.calendar-event{background:var(--accent);color:#fff;padding:4px 8px;border-radius:4px;font-size:10px;margin-bottom:4px}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);align-items:center;justify-content:center;z-index:100}
.modal.active{display:flex}
.modal-content{background:var(--bg2);border-radius:12px;padding:30px;width:400px;max-width:90%}
.modal h3{margin-bottom:20px}
.form-group{margin-bottom:15px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.form-group input,.form-group textarea,.form-group select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px;color:var(--text);font-size:14px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
</style>
</head>
<body>
<div class="sidebar">
<div class="logo"><div class="logo-icon">🎯</div>Mission Control</div>
<div class="nav">
<div class="nav-item active" data-s="overview">📊 Overview</div>
<div class="nav-item" data-s="tasks">📋 Tasks</div>
<div class="nav-item" data-s="calendar">📅 Calendar</div>
<div class="nav-item" data-s="projects">📁 Projects</div>
<div class="nav-item" data-s="team">👥 Team</div>
</div>
</div>
<div class="main">
<div class="header"><h1 id="page-title">Overview</h1><d,
